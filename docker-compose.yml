services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: airbnb_clone_app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "${HOST_PORT:-8082}:8082"

  mongo:
    image: mongo:7
    container_name: airbnb_clone_mongo
    restart: unless-stopped
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - mongo_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro

volumes:
  mongo_data:
 